<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Luminous Editorial</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>

    <main class="stage">
      <article id="sceneCard" class="editorial-card">
        <figure class="media-wrap">
          <img id="sceneImage" src="images/slide-1.svg" alt="Scene visual" />
        </figure>

        <section id="sceneContent" class="content scene-layer">
          <p id="sceneKicker" class="kicker">Сцена I</p>
          <h1 id="sceneTitle">Золотой час, первый шаг</h1>
          <p id="sceneText" class="copy">
            В архиве модного дома найдено расхождение в показаниях. Ваша команда выбирает
            первую линию расследования.
          </p>
          <div id="choices" class="choices" aria-label="Варианты действий"></div>
        </section>

        <section id="intermission" class="content intermission-layer" aria-live="polite">
          <p id="intermissionText" class="intermission-text"></p>
        </section>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
